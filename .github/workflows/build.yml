name: Build OpenWrt for Xiaomi 4A Gigabit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build OpenWrt
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils python3-pyelftools rsync unzip zlib1g-dev file wget swig
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Clone OpenWrt official source (stable 23.05)
      run: |
        git clone --depth 1 --branch v23.05.5 https://github.com/openwrt/openwrt.git openwrt

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e mi4a.config ] && cp mi4a.config openwrt/.config
        cd openwrt
        make defconfig

    - name: Show target info
      run: |
        cd openwrt
        grep "CONFIG_TARGET_ramips_mt7621_DEVICE" .config || true
        echo "---"
        grep "xiaomi" .config || true

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: List output files
      run: |
        echo "=== All firmware files ==="
        ls -lh openwrt/bin/targets/ramips/mt7621/
        echo "=== BIN files only ==="
        ls -lh openwrt/bin/targets/ramips/mt7621/*.bin || true

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware
        path: openwrt/bin/targets/ramips/mt7621/
